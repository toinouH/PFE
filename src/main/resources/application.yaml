spring:
  application:
    name: SNCF
  datasource:
    url: jdbc:h2:file:./data/sncfdb
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
  h2:
    console:
      enabled: true
      path: /h2-console

path:
  fichierReferentielGares: /path/to/dossiers
  dossierEntreesCAV: /path/to/dossiers
  dossierCAVEnrichisTries: /path/to/dossiers

distance:
    maxkm: 500.00


